{% extends 'base.html' %}
{% block content %}
<h2>Users</h2>
<a href="{{ url_for('admin_users_new') }}" class="btn btn-sm btn-primary mb-2">New User</a>
<table class="table table-sm">
  <thead><tr><th>Username</th><th>Name</th><th>Role</th><th></th></tr></thead>
  <tbody>
    {% for u in users %}
    <tr>
      <td>{{ u.username }}</td>
      <td>{{ u.name }}</td>
      <td>{{ u.role }}</td>
      <td>
        <a href="{{ url_for('admin_users_edit', user_id=u.id) }}" class="btn btn-sm btn-outline-primary">Edit</a>
        <form method="post" action="{{ url_for('admin_users_delete', user_id=u.id) }}" style="display:inline;">
          <button class="btn btn-sm btn-danger" onclick="return confirm('Delete user?');">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
