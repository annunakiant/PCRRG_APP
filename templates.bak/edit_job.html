{% extends 'base.html' %}
{% block content %}
<h2>Edit Job {{ job.job_number }}</h2>
<form method="post">
  <div class="mb-2"><label>Job Number</label><input name="job_number" class="form-control" value="{{ job.job_number }}"></div>
  <div class="mb-2"><label>Title</label><input name="title" class="form-control" value="{{ job.title }}"></div>
  <div class="mb-2"><label>Client Name</label><input name="client_name" class="form-control" value="{{ job.client_name }}"></div>
  <div class="mb-2"><label>Address</label><input name="address" class="form-control" value="{{ job.address }}"></div>
  <div class="mb-2"><label>Service Type</label><input name="service_type" class="form-control" value="{{ job.service_type }}"></div>
  <div class="mb-2">
    <label>Status</label>
    <select name="status" class="form-select">
      <option value="open" {% if job.status=='open' %}selected{% endif %}>Open</option>
      <option value="closed" {% if job.status=='closed' %}selected{% endif %}>Closed</option>
      <option value="archived" {% if job.status=='archived' %}selected{% endif %}>Archived</option>
    </select>
  </div>
  <button class="btn btn-primary">Save</button>
</form>
{% endblock %}
