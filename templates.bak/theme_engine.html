{% extends 'base.html' %}
{% block content %}
<h2>Theme Engine 2.0 — CompanyCam Dark</h2>

<form method='post' enctype='multipart/form-data' class='cc-card'>

  <h4>Mode</h4>
  <select name='mode' class='form-select mb-3'>
    <option value='dark' {% if theme.mode=='dark' %}selected{% endif %}>Dark</option>
    <option value='light' {% if theme.mode=='light' %}selected{% endif %}>Light</option>
  </select>

  <h4>Primary Color</h4>
  <input name='primary' class='form-control mb-3' value='{{ theme.primary }}'>

  <h4>Accent Color</h4>
  <input name='accent' class='form-control mb-3' value='{{ theme.accent }}'>

  <h4>Background Color</h4>
  <input name='background' class='form-control mb-3' value='{{ theme.background }}'>

  <h4>Background Image</h4>
  <input type='file' name='background_image_file' class='form-control mb-3'>
  <input name='background_image' class='form-control mb-3' value='{{ theme.background_image }}'>

  <h4>Card Style</h4>
  <input name='card' class='form-control mb-3' value='{{ theme.card }}'>
  <input name='card_border' class='form-control mb-3' value='{{ theme.card_border }}'>

  <h4>Font Family</h4>
  <input name='font_family' class='form-control mb-3' value='{{ theme.font_family }}'>

  <h4>Font Size</h4>
  <input name='font_size' class='form-control mb-3' value='{{ theme.font_size }}'>

  <h4>Layout</h4>
  <select name='layout' class='form-select mb-3'>
    <option value='compact' {% if theme.layout=='compact' %}selected{% endif %}>Compact</option>
    <option value='wide' {% if theme.layout=='wide' %}selected{% endif %}>Wide</option>
  </select>

  <h4>Tabs</h4>
  <select name='tabs' class='form-select mb-3'>
    <option value='pill' {% if theme.tabs=='pill' %}selected{% endif %}>Pill</option>
    <option value='underline' {% if theme.tabs=='underline' %}selected{% endif %}>Underline</option>
    <option value='sidebar' {% if theme.tabs=='sidebar' %}selected{% endif %}>Sidebar</option>
  </select>

  <h4>Buttons</h4>
  <select name='buttons' class='form-select mb-3'>
    <option value='rounded' {% if theme.buttons=='rounded' %}selected{% endif %}>Rounded</option>
    <option value='square' {% if theme.buttons=='square' %}selected{% endif %}>Square</option>
  </select>

  <button class='btn btn-primary mt-3'>Save Theme</button>
</form>
{% endblock %}
