<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PCRRG FieldOps</title>
  <style>
    :root {
      --primary: {{ theme.primary_color if theme else '#1E88E5' }};
      --secondary: {{ theme.secondary_color if theme else '#FFC107' }};
    }
    body { font-family: Arial, sans-serif; margin: 20px; }
    header { background: var(--primary); color: white; padding: 10px; }
    .btn { padding: 6px 10px; border-radius:4px; background:var(--primary); color:white; text-decoration:none; }
    .muted { color:#666; }
    img.logo { height:40px; vertical-align:middle; }
  </style>
</head>
<body>
  <header>
    <img src="{{ theme.logo_url if theme else '/static/logo.png' }}" class="logo" alt="logo">
    &nbsp; PCRRG FieldOps
    {% if current_user.is_authenticated %}
      &nbsp; | &nbsp; <a href="{{ url_for('logout') }}" style="color:white;">Logout</a>
    {% endif %}
  </header>
  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
        {% for m in messages %}
          <li>{{ m }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
