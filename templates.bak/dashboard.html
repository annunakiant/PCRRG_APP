{% extends "base.html" %}
{% block content %}
<h2>Dashboard</h2>
<p>Open: {{ jobs_open }} | Closed: {{ jobs_closed }} | Archived: {{ jobs_archived }}</p>
<h3>Recent Jobs</h3>
<ul>
  {% for j in recent_jobs %}
    <li><a href="{{ url_for('view_job', job_id=j.id) }}">{{ j.job_number }} - {{ j.title }}</a></li>
  {% else %}
    <li>No jobs yet</li>
  {% endfor %}
</ul>
{% endblock %}
