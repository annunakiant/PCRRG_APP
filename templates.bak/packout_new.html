{% extends "base.html" %}
{% block title %}New Packout Report{% endblock %}
{% block subtitle %}{{ job.job_number }} – {{ job.title }}{% endblock %}

{% block content %}
<div class="card">
  <div class="card-title">Packout Items</div>
  <form method="post" style="font-size:0.85rem;">
    <table style="width:100%;border-collapse:collapse;font-size:0.8rem;">
      <thead>
        <tr style="border-bottom:1px solid #1f2937;">
          <th style="text-align:left;padding:0.25rem;">Item</th>
          <th style="text-align:left;padding:0.25rem;">Location</th>
          <th style="text-align:left;padding:0.25rem;">Count</th>
          <th style="text-align:left;padding:0.25rem;">Condition</th>
          <th style="text-align:left;padding:0.25rem;">Photos</th>
        </tr>
      </thead>
      <tbody id="packout-body">
        <tr>
          <td><input name="item_0" placeholder="e.g. Sofa"
                     style="width:100%;padding:0.25rem;border-radius:0.5rem;border:1px solid #374151;background:#020617;color:#e5e7eb;"></td>
          <td><input name="location_0" placeholder="e.g. Living Room"
                     style="width:100%;padding:0.25rem;border-radius:0.5rem;border:1px solid #374151;background:#020617;color:#e5e7eb;"></td>
          <td><input name="count_0" type="number" value="1"
                     style="width:100%;padding:0.25rem;border-radius:0.5rem;border:1px solid #374151;background:#020617;color:#e5e7eb;"></td>
          <td>
            <select name="condition_0"
                    style="width:100%;padding:0.25rem;border-radius:0.5rem;border:1px solid #374151;background:#020617;color:#e5e7eb;">
              <option value="Retained">Retained</option>
              <option value="Salvageable">Salvageable</option>
              <option value="Non-salvageable">Non-salvageable</option>
            </select>
          </td>
          <td>
            <input type="file" name="photo_0" multiple>
          </td>
        </tr>
      </tbody>
    </table>
    <button type="button" class="btn btn-outline" style="margin-top:0.5rem;" onclick="addPackoutRow()">Add Item</button>
    <button type="submit" class="btn btn-primary" style="margin-top:0.5rem;margin-left:0.5rem;">Save Packout Report</button>
    <a href="{{ url_for('view_job', job_id=job.id) }}" class="btn btn-outline" style="margin-left:0.5rem;">Back to Job Folder</a>
  </form>
</div>

<script>
let packoutIndex = 1;
function addPackoutRow(){
  const tbody = document.getElementById('packout-body');
  const tr = document.createElement('tr');
  tr.innerHTML = 
    <td><input name="item_" placeholder="Item"
               style="width:100%;padding:0.25rem;border-radius:0.5rem;border:1px solid #374151;background:#020617;color:#e5e7eb;"></td>
    <td><input name="location_" placeholder="Location"
               style="width:100%;padding:0.25rem;border-radius:0.5rem;border:1px solid #374151;background:#020617;color:#e5e7eb;"></td>
    <td><input name="count_" type="number" value="1"
               style="width:100%;padding:0.25rem;border-radius:0.5rem;border:1px solid #374151;background:#020617;color:#e5e7eb;"></td>
    <td>
      <select name="condition_"
              style="width:100%;padding:0.25rem;border-radius:0.5rem;border:1px solid #374151;background:#020617;color:#e5e7eb;">
        <option value="Retained">Retained</option>
        <option value="Salvageable">Salvageable</option>
        <option value="Non-salvageable">Non-salvageable</option>
      </select>
    </td>
    <td>
      <input type="file" name="photo_" multiple>
    </td>
  ;
  tbody.appendChild(tr);
  packoutIndex++;
}
</script>
{% endblock %}
