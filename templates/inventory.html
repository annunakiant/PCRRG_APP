{% extends 'base.html' %}
{% block content %}
<h2>Inventory</h2>
{% if is_admin %}
<a href="{{ url_for('inventory_new') }}" class="btn btn-sm btn-primary mb-2">New Item</a>
{% endif %}
<table class="table table-sm">
  <thead><tr><th>Name</th><th>SKU</th><th>Qty</th><th>Location</th><th></th></tr></thead>
  <tbody>
    {% for i in items %}
    <tr>
      <td>{{ i.name }}</td>
      <td>{{ i.sku }}</td>
      <td>{{ i.quantity }}</td>
      <td>{{ i.location }}</td>
      <td>
        {% if is_admin %}
        <a href="{{ url_for('inventory_edit', item_id=i.id) }}" class="btn btn-sm btn-outline-primary">Edit</a>
        <form method="post" action="{{ url_for('inventory_delete', item_id=i.id) }}" style="display:inline;">
          <button class="btn btn-sm btn-danger" onclick="return confirm('Delete item?');">Delete</button>
        </form>
        {% endif %}
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
