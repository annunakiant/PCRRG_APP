<!doctype html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <title>PCRRG FieldOps</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>

  <link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap' rel='stylesheet'>
  <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'>

  <style>
    body {
      background: {{ t.background }};
      color: #e5e5e5;
      font-family: {{ t.font_family }};
      font-size: {{ t.font_size }};
      {% if t.background_image %}
      background-image: url('{{ t.background_image }}');
      background-size: cover;
      background-position: center;
      {% endif %}
    }

    .topbar {
      background: #000;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #222;
    }

    .app-nav {
      background: #0d0d0d;
      border-bottom: 1px solid #222;
      padding: 0.5rem 1rem;
      display: flex;
      gap: 1rem;
    }

    .app-nav a {
      color: #aaa;
      text-decoration: none;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
    }

    .app-nav a.active {
      background: {{ t.primary }};
      color: #fff !important;
    }

    .cc-card {
      background: {{ t.card }};
      border: 1px solid {{ t.card_border }};
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      backdrop-filter: blur(10px);
    }

    .btn-primary {
      background-color: {{ t.primary }} !important;
      border-color: {{ t.primary }} !important;
    }
  </style>
</head>

<body>

<div class='topbar'>
  <div class='topbar-logo'>
    {% if theme.logo_url %}
      <img src='{{ theme.logo_url }}' style='height:36px; margin-right:10px; border-radius:6px;'>
    {% endif %}
    PCRRG FieldOps
  </div>
  <div>
    {{ current_user.name or current_user.username }} |
    <a href='{{ url_for('logout') }}' class='text-light'>Logout</a>
  </div>
</div>

<div class='app-nav'>
  <a href='{{ url_for('dashboard') }}' class='{% if request.endpoint=="dashboard" %}active{% endif %}'>Dashboard</a>
  <a href='{{ url_for('inventory_list') }}' class='{% if "inventory" in request.endpoint %}active{% endif %}'>Inventory</a>
  <a href='{{ url_for('new_job') }}' class='{% if request.endpoint=="new_job" %}active{% endif %}'>New Job</a>
  <a href='{{ url_for('admin_home') }}' class='{% if "admin" in request.endpoint %}active{% endif %}'>Admin</a>
  <a href='{{ url_for('admin_task_templates') }}' class='{% if "task" in request.endpoint %}active{% endif %}'>Tasks</a>
  <a href='{{ url_for('manage_contracts') }}' class='{% if "contract" in request.endpoint %}active{% endif %}'>Contracts</a>
  <a href='{{ url_for('theme.theme_admin') }}'>Theme Engine</a>
</div>

<div class='container-fluid mt-3'>
  {% block content %}{% endblock %}
</div>

<script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js'></script>
</body>
</html>
