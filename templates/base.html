<!doctype html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <title>PCRRG FieldOps</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>

  <!-- Fonts -->
  <link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap' rel='stylesheet'>

  <!-- Bootstrap -->
  <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'>

  <style>
    body {
      background: #0f0f11;
      color: #e5e5e5;
      font-family: Inter, system-ui;
      font-size: 15px;
    }

    /* Top bar */
    .topbar {
      background: #0a0a0c;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1c1c1f;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      font-weight: 600;
      font-size: 1.25rem;
      color: #fff;
    }

    .topbar-logo img {
      height: 36px;
      margin-right: 10px;
      border-radius: 6px;
    }

    /* Navigation */
    .app-nav {
      background: #111114;
      border-bottom: 1px solid #1c1c1f;
      padding: 0.5rem 1rem;
      display: flex;
      gap: 1rem;
      font-weight: 500;
    }

    .app-nav a {
      color: #9aa0a6;
      text-decoration: none;
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      transition: 0.2s;
    }

    .app-nav a:hover {
      background: #1a1a1d;
      color: #dfe3e6;
    }

    .app-nav a.active {
      background: #1e2a38;
      color: #8cc0ff !important;
      border: 1px solid #2d3f52;
    }

    /* Cards */
    .cc-card {
      background: #141416;
      border: 1px solid #1f1f22;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    /* Buttons */
    .btn-primary {
      background-color: #4a90e2 !important;
      border-color: #4a90e2 !important;
      font-weight: 500;
      border-radius: 8px;
    }

    .btn-primary:hover {
      background-color: #6ab0ff !important;
      border-color: #6ab0ff !important;
    }

    .btn-outline-primary {
      border-color: #4a90e2 !important;
      color: #4a90e2 !important;
      border-radius: 8px;
    }

    .btn-outline-primary:hover {
      background: #4a90e2 !important;
      color: #fff !important;
    }

    /* Inputs */
    .form-control, .form-select {
      background: #1a1a1d;
      border: 1px solid #2a2a2e;
      color: #e5e5e5;
      border-radius: 8px;
    }

    .form-control:focus, .form-select:focus {
      background: #1a1a1d;
      border-color: #4a90e2;
      color: #fff;
      box-shadow: none;
    }

    /* Tables */
    table {
      color: #d0d0d0;
    }

    table thead {
      background: #0d0d10;
    }

    table tbody tr {
      background: #141416;
      border-bottom: 1px solid #1f1f22;
    }
  </style>
</head>

<body>

<div class='topbar'>
  <div class='topbar-logo'>
    {% if theme.logo_url %}
      <img src='{{ theme.logo_url }}'>
    {% endif %}
    PCRRG FieldOps
  </div>
  <div>
    {{ current_user.name or current_user.username }} |
    <a href='{{ url_for('logout') }}' class='text-light'>Logout</a>
  </div>
</div>

<div class='app-nav'>
  <a href='{{ url_for('dashboard') }}' class='{% if request.endpoint=="dashboard" %}active{% endif %}'>Dashboard</a>
  <a href='{{ url_for('inventory_list') }}' class='{% if "inventory" in request.endpoint %}active{% endif %}'>Inventory</a>
  <a href='{{ url_for('new_job') }}' class='{% if request.endpoint=="new_job" %}active{% endif %}'>New Job</a>
  <a href='{{ url_for('admin_home') }}' class='{% if "admin" in request.endpoint %}active{% endif %}'>Admin</a>
  <a href='{{ url_for('admin_task_templates') }}' class='{% if "task" in request.endpoint %}active{% endif %}'>Tasks</a>
  <a href='{{ url_for('manage_contracts') }}' class='{% if "contract" in request.endpoint %}active{% endif %}'>Contracts</a>
</div>

<div class='container-fluid mt-3'>
  {% block content %}{% endblock %}
</div>

<script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js'></script>
</body>
</html>
