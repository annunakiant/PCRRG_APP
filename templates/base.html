<html lang='en'>
<head>
  <meta charset='utf-8'>
  <title>PCRRG FieldOps</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>

  <link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap' rel='stylesheet'>
  <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'>

  <style>
    :root {
      --primary: {{ theme.primary_color or '#2ec4b6' }};
      --secondary: {{ theme.secondary_color or '#FFC107' }};
      --primary-glow: rgba(46,196,182,0.35);
      --bg: #0e0f10;
      --bg2: #141517;
      --border: #1f2023;
      --text: #e6e6e6;
      --text-soft: #aeb4b8;
    }
    body { background: var(--bg); color: var(--text); font-family: Inter, system-ui; }
    .topbar { background:#0b0c0d; padding:0.75rem 1rem; display:flex; justify-content:space-between; border-bottom:1px solid var(--border); }
    .topbar-logo img { height:36px; margin-right:10px; border-radius:6px; }
    .app-nav { background:#111214; padding:0.5rem 1rem; display:flex; gap:1rem; }
    .app-nav a { color:var(--text-soft); text-decoration:none; padding:0.45rem 0.85rem; border-radius:8px; }
    .app-nav a.active { background:rgba(46,196,182,0.15); color:var(--primary) !important; border:1px solid rgba(46,196,182,0.35); }
  </style>
</head>

<body>

<div class='topbar'>
  <div class='topbar-logo'>
    <img src='{{ theme.logo_url }}'>
    PCRRG FieldOps
  </div>
  <div>
    {{ current_user.name or current_user.username }} |
    <a href='{{ url_for("logout") }}' class='text-light'>Logout</a>
  </div>
</div>

<div class='app-nav'>
  <a href='{{ url_for("dashboard") }}' class='{% if request.endpoint=="dashboard" %}active{% endif %}'>Dashboard</a>
  <a href='{{ url_for("inventory_list") }}' class='{% if "inventory" in request.endpoint %}active{% endif %}'>Inventory</a>
  <a href='{{ url_for("new_job") }}' class='{% if request.endpoint=="new_job" %}active{% endif %}'>New Job</a>
  <a href='{{ url_for("admin_home") }}' class='{% if "admin" in request.endpoint %}active{% endif %}'>Admin</a>
  <a href='{{ url_for("view_packout", job_id=1) }}'>Packouts</a>
  <a href='{{ url_for("manage_contracts") }}' class='{% if "contract" in request.endpoint %}active{% endif %}'>Contracts</a>
</div>

<div class='container-fluid mt-3'>
  {% block content %}{% endblock %}
</div>

<script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js'></script>
</body>
</html>
