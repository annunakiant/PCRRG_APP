{% extends "base.html" %}
{% block content %}
<h2>Admin Control Center</h2>
<section style="background:white;padding:12px;border-radius:8px;margin-bottom:12px;">
  <h3>Theme / Branding</h3>
  <form method="post" action="{{ url_for('admin_theme_update') }}">
    <div class="row"><label>Primary color</label><input type="color" name="primary_color" value="{{ theme.primary_color or '#1E88E5' }}"></div>
    <div class="row"><label>Secondary color</label><input type="color" name="secondary_color" value="{{ theme.secondary_color or '#FFC107' }}"></div>
    <div class="row"><label>Logo URL</label><input type="text" name="logo_url" value="{{ theme.logo_url or '/static/logo.png' }}"></div>
    <button type="submit" class="btn">Save Theme</button>
  </form>
</section>
<section style="background:white;padding:12px;border-radius:8px;">
  <h3>Recent Jobs</h3>
  <ul>{% for j in jobs %}<li><a href="{{ url_for('view_job', job_id=j.id) }}">{{ j.job_number }} - {{ j.title }}</a></li>{% else %}<li>No jobs yet</li>{% endfor %}</ul>
</section>
{% endblock %}
