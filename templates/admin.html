{% extends 'base.html' %}
{% block content %}
<h2>Admin Control Center</h2>

<div class="mb-3">
  <a href="{{ url_for('admin_users') }}" class="btn btn-sm btn-outline-primary">Manage Users</a>
  <a href="{{ url_for('admin_task_templates') }}" class="btn btn-sm btn-outline-primary">Task Templates</a>
  <a href="{{ url_for('manage_contracts') }}" class="btn btn-sm btn-outline-primary">Contracts</a>
</div>

<h4>Recent Jobs</h4>
<table class="table table-sm">
  <thead><tr><th>#</th><th>Title</th><th>Status</th><th></th></tr></thead>
  <tbody>
    {% for j in jobs %}
    <tr>
      <td>{{ j.job_number }}</td>
      <td>{{ j.title }}</td>
      <td>{{ j.status }}</td>
      <td>
        <a href="{{ url_for('view_job', job_id=j.id) }}" class="btn btn-sm btn-outline-primary">Open</a>
        <form method="post" action="{{ url_for('delete_job', job_id=j.id) }}" style="display:inline;">
          <button class="btn btn-sm btn-danger" onclick="return confirm('Delete job?');">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
