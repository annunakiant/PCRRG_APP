<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign Contract - PCRRG</title>
    <!-- Styled perfectly to match your dark theme -->
    <style>
        body { background-color: #121212; color: #ffffff; font-family: Arial, sans-serif; padding: 20px; overscroll-behavior-y: contain; margin: 0;}
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 8px; max-width: 600px; margin: 0 auto; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);}
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-weight: bold; }
        input { width: 100%; padding: 10px; background-color: #2c2c2c; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .signature-wrapper { position: relative; width: 100%; height: 250px; background: #fff; border-radius: 4px; margin-bottom: 15px; touch-action: none; border: 2px dashed #666; }
        canvas { width: 100%; height: 100%; display: block; border-radius: 4px; }
        .btn { padding: 12px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; border: none; text-align: center; }
        .btn-success { background-color: #28a745; color: white; width: 100%; margin-top: 10px; font-size: 16px;}
        .btn-secondary { background-color: #555; color: white; font-size: 14px;}
        .btn-outline { background: transparent; border: 1px solid #aaa; color: #aaa; text-decoration: none; padding: 5px 10px; border-radius: 4px;}
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h3 style="margin: 0;">Sign Authorization</h3>
        <a href="/jobs/{{ job.id }}" class="btn-outline">Cancel</a>
    </div>
    <p style="color: #aaa;">Job: <strong>{{ job.job_number }}</strong> - {{ job.title }}</p>
    
    <form method="POST" id="signatureForm">
        <div class="form-group">
            <label>Signer Full Name</label>
            <input type="text" name="signer_name" required placeholder="Full Name">
        </div>
        <div class="form-group">
            <label>Signer Email (Optional)</label>
            <input type="email" name="signer_email" placeholder="email@example.com">
        </div>
        
        <label>Please Sign Below:</label>
        <div class="signature-wrapper">
            <canvas id="sigCanvas"></canvas>
        </div>
        <button type="button" class="btn btn-secondary" id="clearBtn">Clear Signature</button>
        
        <input type="hidden" name="signature_data" id="signatureData">
        <input type="hidden" name="lat" id="lat">
        <input type="hidden" name="lon" id="lon">
        
        <button type="submit" class="btn btn-success">Submit Legal Signature</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script>
    const canvas = document.getElementById('sigCanvas');
    function resizeCanvas() {
        const ratio =  Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    const signaturePad = new SignaturePad(canvas, { penColor: "rgb(0, 0, 51)" });
    document.getElementById('clearBtn').addEventListener('click', () => signaturePad.clear());
    document.getElementById('signatureForm').addEventListener('submit', function(e) {
        if (signaturePad.isEmpty()) { e.preventDefault(); alert("Please provide a signature before submitting."); }
        else { document.getElementById('signatureData').value = signaturePad.toDataURL("image/png"); }
    });
    if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(function(position) {
            document.getElementById('lat').value = position.coords.latitude;
            document.getElementById('lon').value = position.coords.longitude;
        });
    }
</script>
</body>
</html>
