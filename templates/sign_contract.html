{% extends 'base.html' %}
{% block content %}
<h1 class='h4 mb-3'>Sign Contract for {{ job.job_number }} — {{ job.title }}</h1>
<p>Signer, please enter your name and email to sign this contract.</p>
<form method='post'>
  <div class='mb-3'><label class='form-label'>Your Name</label><input class='form-control' name='signer_name' required></div>
  <div class='mb-3'><label class='form-label'>Your Email</label><input class='form-control' name='signer_email' required></div>
  <button class='btn btn-success' type='submit'>Sign Contract</button>
</form>
{% endblock %}
