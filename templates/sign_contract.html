{% extends 'base.html' %}
{% block content %}
<h2>Sign Contract for Job {{ job.job_number }}</h2>
<p>Template ID: {{ contract.template_id }}</p>
<form method="post">
  <div class="mb-2"><label>Your Name</label><input name="signer_name" class="form-control" required></div>
  <div class="mb-2"><label>Your Email</label><input name="signer_email" class="form-control"></div>
  <button class="btn btn-primary">Sign</button>
</form>
{% endblock %}
