<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign Contract - PCRRG App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; overscroll-behavior-y: contain; }
        .signature-wrapper {
            position: relative; width: 100%; height: 300px; background: #fff;
            border: 2px dashed #1E88E5; border-radius: 8px; margin-bottom: 20px;
            touch-action: none; /* Prevents screen scrolling while signing on mobile */
        }
        canvas { width: 100%; height: 100%; display: block; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container py-4" style="max-width: 600px;">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Sign Authorization</h5>
            <a href="/jobs/{{ job.id }}" class="btn btn-sm btn-light">Cancel</a>
        </div>
        <div class="card-body">
            <p class="text-muted">Job: <strong>{{ job.job_number }}</strong> - {{ job.title }}</p>
            <form method="POST" id="signatureForm">
                <div class="mb-3">
                    <label class="form-label">Signer Full Name</label>
                    <input type="text" name="signer_name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Signer Email (Optional)</label>
                    <input type="email" name="signer_email" class="form-control">
                </div>
                <label class="form-label text-primary fw-bold">Sign Below:</label>
                <div class="signature-wrapper">
                    <canvas id="sigCanvas"></canvas>
                </div>
                <button type="button" class="btn btn-sm btn-outline-secondary mb-3" id="clearBtn">Clear Signature</button>
                <input type="hidden" name="signature_data" id="signatureData">
                <input type="hidden" name="lat" id="lat">
                <input type="hidden" name="lon" id="lon">
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg">Submit Legal Signature</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script>
    const canvas = document.getElementById('sigCanvas');
    function resizeCanvas() {
        const ratio =  Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    const signaturePad = new SignaturePad(canvas, { penColor: "rgb(0, 51, 153)" });
    document.getElementById('clearBtn').addEventListener('click', () => signaturePad.clear());
    document.getElementById('signatureForm').addEventListener('submit', function(e) {
        if (signaturePad.isEmpty()) { e.preventDefault(); alert("Please provide a signature before submitting."); }
        else { document.getElementById('signatureData').value = signaturePad.toDataURL("image/png"); }
    });
    if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(function(position) {
            document.getElementById('lat').value = position.coords.latitude;
            document.getElementById('lon').value = position.coords.longitude;
        });
    }
</script>
</body>
</html>
