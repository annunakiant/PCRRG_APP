{% extends "base.html" %}
{% block content %}
<h2>{{ 'New Inventory Item' if not item else 'Edit Inventory Item' }}</h2>

<form method="post" class="cc-card">
  <div class="mb-2">
    <label>Name</label>
    <input class="form-control" type="text" name="name" value="{{ item.name if item else '' }}" required>
  </div>
  <div class="mb-2">
    <label>SKU</label>
    <input class="form-control" type="text" name="sku" value="{{ item.sku if item else '' }}">
  </div>
  <div class="mb-2">
    <label>Barcode</label>
    <input class="form-control" type="text" name="barcode" value="{{ item.barcode if item else '' }}">
  </div>
  <div class="mb-2">
    <label>Quantity</label>
    <input class="form-control" type="number" name="quantity" value="{{ item.quantity if item else 0 }}">
  </div>
  <div class="mb-2">
    <label>Location</label>
    <input class="form-control" type="text" name="location" value="{{ item.location if item else '' }}">
  </div>
  <div class="mb-2">
    <label>Notes</label>
    <textarea class="form-control" name="notes">{{ item.notes if item else '' }}</textarea>
  </div>
  <button class="btn btn-primary">Save</button>
</form>
{% endblock %}
