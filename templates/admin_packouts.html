{% extends "base.html" %}
{% block content %}
<h2>All Packout Items (Admin)</h2>
<table>
  <thead><tr><th>Job</th><th>Item</th><th>Qty</th><th>Location</th><th>Photos</th></tr></thead>
  <tbody>
    {% for item in items %}
      <tr>
        <td><a href="{{ url_for('view_job', job_id=item.job_id) }}">Job #{{ item.job.job_number }}</a></td>
        <td>{{ item.name }}</td>
        <td>{{ item.quantity }}</td>
        <td>{{ item.location }}</td>
        <td>
          {% for p in item.photos %}
            <img class="thumb" src="/static/{{ p.filename }}" alt="packout photo">
          {% else %}
            No photo
          {% endfor %}
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
